<style>
:root{
  --paper:#FAF7F2;
  --ink:#0C2340;
  --ink-soft:#43586F;
  --accent:#C4400F;
  --line:rgba(12,35,64,.16);
  --serif:'Fraunces',Georgia,'Times New Roman',serif;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,'Cascadia Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--sans);font-size:1.0625rem;line-height:1.65;
  color:var(--ink);background:var(--paper);
  min-height:100svh;display:grid;place-items:center;
  padding:clamp(1.5rem,5vw,3rem);
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--ink);color:var(--paper)}
svg{display:block;max-width:100%}
a{color:inherit}
:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:2px}
.plate{
  max-width:34rem;width:100%;
  border:1px solid var(--line);background:#FFFDF9;
  box-shadow:0 24px 60px -44px rgba(12,35,64,.5);
  padding:clamp(2rem,6vw,3.25rem);
  display:grid;gap:1.25rem;justify-items:start;
}
.kicker{
  display:flex;align-items:center;gap:.9rem;
  font-family:var(--mono);font-size:.72rem;font-weight:500;
  letter-spacing:.22em;text-transform:uppercase;color:var(--accent);
}
.kicker::before{content:"";width:2.4rem;height:1px;background:var(--accent);flex:none}
.mark{width:3rem;height:3rem}
h1{
  font-family:var(--serif);font-weight:500;line-height:1.05;
  letter-spacing:-.01em;font-size:clamp(3.2rem,12vw,5.5rem);
}
h1 em{font-style:italic;color:var(--accent)}
.sub{font-family:var(--serif);font-size:clamp(1.15rem,3vw,1.45rem);line-height:1.4}
p{color:var(--ink-soft)}
.waves{width:100%;color:var(--ink-soft);opacity:.55}
.btn{
  display:inline-flex;align-items:center;gap:.55rem;
  font-family:var(--mono);font-size:.8rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;
  text-decoration:none;padding:.95rem 1.5rem;border-radius:99px;
  border:1px solid var(--ink);background:var(--ink);color:var(--paper);
  transition:background .2s ease,border-color .2s ease,transform .2s ease;
}
.btn:hover{background:var(--accent);border-color:var(--accent)}
.btn:active{transform:scale(.98)}
.btn svg{width:.9rem;height:.9rem;flex:none;transition:transform .25s ease}
.btn:hover svg{transform:translateX(-3px)}
.foot{font-family:var(--mono);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft)}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none !important;transition:none !important}
}
</style>

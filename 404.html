<style>
:root{
  --ink:#0A1A2A;
  --ink-2:#41586D;
  --mist:#F3F7FA;
  --line:rgba(10,26,42,.12);
  --accent:#0A66E8;
  --accent-deep:#084FBE;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{

  font-size:1.0625rem;line-height:1.6;color:var(--ink);

  min-height:100vh;min-height:100svh;
  display:grid;place-items:center;
  padding:clamp(1.5rem,5vw,3rem);
  -webkit-font-smoothing:antialiased;
}
img,svg{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
::selection{background:rgba(10,102,232,.18)}
:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:4px}
.card{
  width:min(30rem,100%);
  background:#fff;border:1px solid var(--line);border-radius:22px;
  box-shadow:0 30px 80px -50px rgba(10,26,42,.45);
  padding:clamp(2rem,6vw,3.2rem);
  display:grid;gap:1.1rem;justify-items:start;
}
.brand{display:flex;align-items:center;gap:.65rem}
.brand img{width:2.2rem;height:auto}
.brand span{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:1.02rem;letter-spacing:-.01em}
.kicker{
  font-size:.72rem;font-weight:600;letter-spacing:.24em;text-transform:uppercase;
  color:var(--accent-deep);display:flex;align-items:center;gap:.75rem;
}
.kicker::before{content:"";width:26px;height:1px;background:currentColor;opacity:.55}
h1{
  font-family:"Space Grotesk","Inter",sans-serif;font-weight:600;
  font-size:clamp(3.4rem,14vw,5.6rem);line-height:1;letter-spacing:-.03em;
}
p{color:var(--ink-2);text-wrap:pretty}
.waves{width:100%;color:var(--ink-2);opacity:.45}
.btn{
  display:inline-flex;align-items:center;gap:.55rem;
  font-weight:600;font-size:.95rem;
  padding:.85rem 1.6rem;border-radius:999px;
  background:var(--accent);color:#fff;
  box-shadow:0 10px 30px -12px rgba(10,102,232,.55);
  transition:background .25s,transform .25s;
}
.btn:hover{background:var(--accent-deep);transform:translateY(-2px)}
.btn svg{width:.95em;height:.95em;flex:none}
.foot{font-size:.78rem;color:var(--ink-2)}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none !important;transition:none !important}
}
